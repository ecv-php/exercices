# Configuration avancée : multiples versions PHP + MySQL + PostgreSQL
# Usage : docker compose -f docker/advanced/compose.yaml up
#
# Ports Nginx : 80xx  (8056, 8074, 8085)
# Ports Caddy : 81xx  (8156, 8174, 8185)

services:
  # -------------------------------------------------------
  # PHP
  # -------------------------------------------------------
  php56:
    image: php:5.6-fpm
    volumes:
      - ../../:/var/www/html
    depends_on:
      - mysql
      - postgres
    restart: unless-stopped

  php74:
    image: php:7.4-fpm
    volumes:
      - ../../:/var/www/html
    depends_on:
      - mysql
      - postgres
    restart: unless-stopped

  php85:
    build: ../php85
    volumes:
      - ../../:/var/www/html
    depends_on:
      - mysql
      - postgres
    restart: unless-stopped

  # -------------------------------------------------------
  # Serveurs Web (1 container chacun, multi-ports)
  # -------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "8056:8056"
      - "8074:8074"
      - "8085:8085"
    volumes:
      - ../../:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php56
      - php74
      - php85
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    ports:
      - "8156:8156"
      - "8174:8174"
      - "8185:8185"
    volumes:
      - ../../:/var/www/html
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - php56
      - php74
      - php85
    restart: unless-stopped

  # -------------------------------------------------------
  # Bases de données
  # -------------------------------------------------------
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # -------------------------------------------------------
  # Clients BDD
  # -------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8082:80"
    environment:
      PMA_HOST: ${PMA_HOST}
      PMA_USER: ${PMA_USER}
      PMA_PASSWORD: ${PMA_PASSWORD}
    depends_on:
      - mysql
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "8083:8080"
    depends_on:
      - mysql
      - postgres
    restart: unless-stopped

volumes:
  mysql_data:
  pg_data:
